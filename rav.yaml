scripts:
  activate: cd backend/api && source ./venv/Scripts/activate
  server: cd backend/api && uv run python manage.py runserver
  web: pnpm --filter web dev
  migrations: cd backend/api && uv run python manage.py makemigrations
  migrate: cd backend/api && uv run python manage.py migrate
  build: pnpm -r build
  start: pnpm --filter web start
